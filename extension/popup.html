<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DemoReel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 400px; height: 600px; background: #0d1117; overflow: hidden; }
    #frame-wrap { width: 100%; height: 100%; position: relative; }
    iframe {
      width: 100%; height: 100%; border: none;
      display: block;
    }
    #loading {
      position: absolute; inset: 0;
      background: #0d1117;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #e6edf3; font-family: -apple-system, sans-serif;
      gap: 14px;
    }
    .logo { font-size: 2.5rem; }
    .logo-text { font-size: 1.1rem; font-weight: 700; background: linear-gradient(135deg, #2563eb, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .spinner { width: 28px; height: 28px; border: 3px solid #30363d; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { font-size: 0.78rem; color: #8b949e; }
  </style>
</head>
<body>
<div id="frame-wrap">
  <div id="loading">
    <div class="logo">🎬</div>
    <div class="logo-text">DemoReel Pro</div>
    <div class="spinner"></div>
    <div class="status" id="load-status">Loading...</div>
  </div>
  <iframe id="main-frame" src="" allowtransparency="true"></iframe>
</div>
<script src="popup.js"></script>
</body>
</html>
