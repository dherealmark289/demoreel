<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DemoReel by Maragakis AI</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --bg2: #161b22;
      --bg3: #1c2431;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #2563eb;
      --accent2: #7c3aed;
      --success: #16a34a;
      --error: #dc2626;
      --pill-bg: #21262d;
      --pill-active: #2563eb;
      --pill-active-text: #fff;
    }

    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
    body { background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Layout ── */
    .app { max-width: 780px; margin: 0 auto; padding: 40px 20px 80px; }

    /* ── Header ── */
    header { text-align: center; margin-bottom: 48px; }
    .logo { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .logo-text { font-size: 1.5rem; font-weight: 700; background: linear-gradient(90deg, #fff, #a5b4fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .tagline { color: var(--muted); font-size: 0.95rem; }

    /* ── Card ── */
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 28px 28px 24px; margin-bottom: 20px; }

    /* ── URL input ── */
    .url-wrap { display: flex; gap: 12px; flex-wrap: wrap; }
    .url-input {
      flex: 1; min-width: 0;
      background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-size: 1rem; padding: 14px 16px;
      outline: none; transition: border-color 0.2s;
    }
    .url-input:focus { border-color: var(--accent); }
    .url-input::placeholder { color: var(--muted); }

    /* ── Options ── */
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    @media (max-width: 560px) { .options-grid { grid-template-columns: 1fr; } }

    .option-group label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 8px; font-weight: 600; }
    .pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .pill {
      padding: 6px 14px; border-radius: 20px;
      background: var(--pill-bg); border: 1px solid var(--border);
      color: var(--muted); font-size: 0.82rem; cursor: pointer;
      transition: all 0.15s;
    }
    .pill:hover { border-color: var(--accent); color: var(--text); }
    .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

    /* Toggle */
    .toggle-row { display: flex; align-items: center; justify-content: space-between; }
    .toggle-row label { font-size: 0.85rem; color: var(--text); }
    .toggle { position: relative; display: inline-block; width: 40px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: var(--pill-bg); border-radius: 22px; transition: 0.25s; border: 1px solid var(--border); }
    .slider::before { content: ''; position: absolute; height: 16px; width: 16px; left: 2px; top: 2px; background: #fff; border-radius: 50%; transition: 0.25s; }
    input:checked + .slider { background: var(--accent); border-color: var(--accent); }
    input:checked + .slider::before { transform: translateX(18px); }

    /* ── Record button ── */
    .record-btn {
      display: block; width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; border-radius: 12px;
      padding: 16px; font-size: 1.05rem; font-weight: 700;
      cursor: pointer; margin-top: 24px;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.02em;
    }
    .record-btn:hover:not(:disabled) { opacity: 0.92; transform: translateY(-1px); }
    .record-btn:active:not(:disabled) { transform: translateY(0); }
    .record-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .record-btn.loading { position: relative; overflow: hidden; }
    .record-btn.loading::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

    /* ── Progress ── */
    .progress-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 24px 28px; display: none; }
    .progress-card.show { display: block; }
    .progress-label { font-size: 0.85rem; color: var(--muted); margin-bottom: 10px; }
    .progress-bar-wrap { background: var(--bg3); border-radius: 8px; height: 6px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 8px; transition: width 0.4s; animation: progress-pulse 2s ease-in-out infinite; }
    @keyframes progress-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
    .progress-msg { margin-top: 10px; font-size: 0.85rem; color: var(--text); }

    /* ── Result ── */
    .result-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 24px 28px; display: none; }
    .result-card.show { display: block; }
    .result-card h3 { font-size: 1rem; margin-bottom: 16px; color: #86efac; }
    .video-player { width: 100%; border-radius: 10px; background: #000; display: block; max-height: 400px; }
    .result-actions { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
    .btn-download {
      flex: 1; padding: 12px; border-radius: 10px;
      background: var(--success); color: #fff; border: none;
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
      text-decoration: none; text-align: center; transition: opacity 0.2s;
    }
    .btn-download:hover { opacity: 0.88; }
    .btn-new {
      flex: 1; padding: 12px; border-radius: 10px;
      background: var(--pill-bg); color: var(--text); border: 1px solid var(--border);
      font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: border-color 0.2s;
    }
    .btn-new:hover { border-color: var(--accent); }

    /* ── Error ── */
    .error-msg { margin-top: 14px; padding: 12px 16px; background: rgba(220,38,38,0.1); border: 1px solid rgba(220,38,38,0.3); border-radius: 8px; color: #fca5a5; font-size: 0.85rem; display: none; }
    .error-msg.show { display: block; }

    /* ── Footer ── */
    footer { text-align: center; color: var(--muted); font-size: 0.78rem; margin-top: 48px; }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }

    /* ── Divider ── */
    .section-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 600; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header>
      <div class="logo">
        <div class="logo-icon">🎬</div>
        <span class="logo-text">DemoReel</span>
      </div>
      <p class="tagline">Paste a URL → get a polished scroll-through video. Automated. No install required.</p>
    </header>

    <!-- Main form -->
    <div class="card" id="form-card">
      <!-- URL input -->
      <div class="url-wrap">
        <input
          id="url-input"
          class="url-input"
          type="url"
          placeholder="https://yourwebsite.com"
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <!-- Options -->
      <div class="options-grid" style="margin-top: 24px;">

        <!-- Speed -->
        <div class="option-group">
          <label>Scroll Speed</label>
          <div class="pills" data-group="speed">
            <button class="pill" data-value="slow">Slow</button>
            <button class="pill active" data-value="medium">Medium</button>
            <button class="pill" data-value="fast">Fast</button>
            <button class="pill" data-value="blazing">⚡ Blazing</button>
          </div>
        </div>

        <!-- Viewport -->
        <div class="option-group">
          <label>Viewport</label>
          <div class="pills" data-group="viewport">
            <button class="pill" data-value="mobile">📱 Mobile</button>
            <button class="pill" data-value="tablet">Tablet</button>
            <button class="pill active" data-value="desktop">Desktop</button>
            <button class="pill" data-value="widescreen">Wide</button>
          </div>
        </div>

        <!-- Duration -->
        <div class="option-group">
          <label>Max Duration</label>
          <div class="pills" data-group="duration">
            <button class="pill" data-value="10">10s</button>
            <button class="pill" data-value="15">15s</button>
            <button class="pill active" data-value="30">30s</button>
            <button class="pill" data-value="60">60s</button>
          </div>
        </div>

        <!-- Theme -->
        <div class="option-group">
          <label>Page Theme</label>
          <div class="pills" data-group="theme">
            <button class="pill active" data-value="dark">🌙 Dark</button>
            <button class="pill" data-value="light">☀️ Light</button>
          </div>
        </div>

      </div>

      <!-- Toggles row -->
      <div style="display: flex; gap: 32px; margin-top: 20px; flex-wrap: wrap;">
        <div class="toggle-row">
          <label for="cursor-toggle" style="margin-right: 10px;">✨ Glowing Cursor</label>
          <label class="toggle">
            <input type="checkbox" id="cursor-toggle" checked />
            <span class="slider"></span>
          </label>
        </div>
        <div class="toggle-row">
          <label for="music-toggle" style="margin-right: 10px;">🎵 Background Music</label>
          <label class="toggle">
            <input type="checkbox" id="music-toggle" />
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <!-- Record button -->
      <button class="record-btn" id="record-btn" onclick="startRecording()">
        ● Record Video
      </button>
      <div class="error-msg" id="error-msg"></div>
    </div>

    <!-- Progress -->
    <div class="progress-card" id="progress-card">
      <div class="progress-label">Recording in progress…</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress-bar" style="width: 30%"></div>
      </div>
      <div class="progress-msg" id="progress-msg">Starting browser...</div>
    </div>

    <!-- Result -->
    <div class="result-card" id="result-card">
      <h3>✅ Your video is ready!</h3>
      <video class="video-player" id="video-player" controls playsinline></video>
      <div class="result-actions">
        <a class="btn-download" id="download-btn" href="#" download>⬇ Download MP4</a>
        <button class="btn-new" onclick="resetForm()">+ Record Another</button>
      </div>
    </div>

    <!-- Footer -->
    <footer>
      <p>DemoReel by <a href="https://maragakisai.com" target="_blank">Maragakis AI</a> &mdash; Paste URL. Get video. Ship faster.</p>
    </footer>
  </div>

  <script>
    // ── State ─────────────────────────────────────────────────────────────────
    let currentJobId = null;
    let pollTimer = null;
    const progressMessages = [
      'Launching browser...', 'Loading page...', 'Scrolling...', 'Recording...',
      'Encoding video...', 'Running ffmpeg...', 'Almost done...',
    ];
    let progressIndex = 0;
    let progressWidth = 15;

    // ── Pill selection ────────────────────────────────────────────────────────
    document.querySelectorAll('.pills[data-group]').forEach(group => {
      group.addEventListener('click', e => {
        const btn = e.target.closest('.pill');
        if (!btn) return;
        group.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    function getSelected(group) {
      const el = document.querySelector(`.pills[data-group="${group}"] .pill.active`);
      return el ? el.dataset.value : null;
    }

    // ── Recording ─────────────────────────────────────────────────────────────
    async function startRecording() {
      const url = document.getElementById('url-input').value.trim();
      if (!url) {
        showError('Please enter a URL first.');
        return;
      }

      clearError();

      const payload = {
        url,
        speed:    getSelected('speed')    || 'medium',
        viewport: getSelected('viewport') || 'desktop',
        theme:    getSelected('theme')    || 'dark',
        duration: parseInt(getSelected('duration') || '30'),
        cursor:   document.getElementById('cursor-toggle').checked,
        music:    document.getElementById('music-toggle').checked,
      };

      // UI state
      document.getElementById('record-btn').disabled = true;
      document.getElementById('record-btn').classList.add('loading');
      document.getElementById('record-btn').textContent = '⏳ Recording...';
      showProgress();

      try {
        const res = await fetch('/api/record', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();

        if (!res.ok || data.error) {
          throw new Error(data.error || 'Failed to start recording');
        }

        currentJobId = data.id;
        pollJob();
      } catch (err) {
        showError(err.message);
        resetRecordBtn();
        hideProgress();
      }
    }

    function pollJob() {
      if (!currentJobId) return;

      pollTimer = setInterval(async () => {
        try {
          const res = await fetch(`/api/status/${currentJobId}`);
          const data = await res.json();

          if (data.progress) {
            document.getElementById('progress-msg').textContent = data.progress;
          }

          // Animate progress bar
          progressWidth = Math.min(progressWidth + 4, 90);
          document.getElementById('progress-bar').style.width = progressWidth + '%';

          if (data.status === 'done') {
            clearInterval(pollTimer);
            document.getElementById('progress-bar').style.width = '100%';
            setTimeout(() => showResult(data.downloadUrl), 300);
          } else if (data.status === 'error') {
            clearInterval(pollTimer);
            hideProgress();
            resetRecordBtn();
            showError(data.error || 'Recording failed. Check URL and try again.');
          }
        } catch (e) {
          // ignore network blips
        }
      }, 1500);
    }

    function showResult(downloadUrl) {
      hideProgress();
      document.getElementById('result-card').classList.add('show');

      const videoEl = document.getElementById('video-player');
      videoEl.src = downloadUrl;
      videoEl.load();
      videoEl.play().catch(() => {});

      const dlBtn = document.getElementById('download-btn');
      dlBtn.href = downloadUrl;
    }

    function resetForm() {
      clearInterval(pollTimer);
      currentJobId = null;
      progressWidth = 15;
      document.getElementById('result-card').classList.remove('show');
      document.getElementById('video-player').src = '';
      resetRecordBtn();
      clearError();
    }

    function resetRecordBtn() {
      const btn = document.getElementById('record-btn');
      btn.disabled = false;
      btn.classList.remove('loading');
      btn.textContent = '● Record Video';
    }

    // ── Progress ──────────────────────────────────────────────────────────────
    function showProgress() {
      const card = document.getElementById('progress-card');
      card.classList.add('show');
      progressWidth = 15;
      document.getElementById('progress-bar').style.width = progressWidth + '%';
    }

    function hideProgress() {
      document.getElementById('progress-card').classList.remove('show');
    }

    // ── Error ─────────────────────────────────────────────────────────────────
    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = '⚠ ' + msg;
      el.classList.add('show');
    }

    function clearError() {
      document.getElementById('error-msg').classList.remove('show');
    }

    // ── URL input: auto-prefix ─────────────────────────────────────────────────
    document.getElementById('url-input').addEventListener('blur', e => {
      let val = e.target.value.trim();
      if (val && !val.startsWith('http')) {
        e.target.value = 'https://' + val;
      }
    });

    // Enter key on URL input
    document.getElementById('url-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') startRecording();
    });
  </script>
</body>
</html>
